<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Dark card background -->
  <rect width="400" height="220" fill="#1e1e2e"/>
  <!-- Wireframe window chrome -->
  <rect x="20" y="20" width="360" height="180" rx="6" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Fake title bar -->
  <rect x="20" y="20" width="360" height="28" rx="6" fill="#2a2a3e"/>
  <circle cx="38" cy="34" r="5" fill="#ef4444" opacity="0.5"/>
  <circle cx="54" cy="34" r="5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="70" cy="34" r="5" fill="#10b981" opacity="0.5"/>
  <!-- Fake content blocks -->
  <rect x="36" y="62" width="120" height="10" rx="3" fill="#374151"/>
  <rect x="36" y="80" width="200" height="8" rx="3" fill="#2d3748"/>
  <rect x="36" y="96" width="160" height="8" rx="3" fill="#2d3748"/>
  <rect x="36" y="112" width="180" height="8" rx="3" fill="#2d3748"/>
  <!-- Fake image placeholder -->
  <rect x="270" y="62" width="90" height="68" rx="4" fill="#2a2a3e" stroke="#374151" stroke-width="1"/>
  <line x1="270" y1="62" x2="360" y2="130" stroke="#374151" stroke-width="1"/>
  <line x1="360" y1="62" x2="270" y2="130" stroke="#374151" stroke-width="1"/>
  <!-- Placeholder label -->
  <text x="200" y="170" font-family="sans-serif" font-size="11" fill="#4b5563" text-anchor="middle">Wireframe coming soon</text>
  <text x="200" y="188" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">UI anonymized — confidential employer work</text>
</svg>
